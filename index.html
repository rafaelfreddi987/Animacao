<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Espaço → Terra | Animação</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Do Espaço à Terra</h1>
    
    <div class="animation-container">
      <img id="space" src="space.png" alt="Espaço" class="slide">
      <img id="earth" src="earth.png" alt="Terra" class="slide">
    </div>

    <div class="controls">
      <button onclick="playAnimation()">▶ Reproduzir Animação</button>
      <button onclick="resetAnimation()">Reiniciar</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
