<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Espaço → Terra</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #000;
      color: white;
      text-align: center;
      padding: 20px;
      overflow: hidden;
    }
    h1 {
      margin: 20px 0 30px;
      font-size: 2.8rem;
      background: linear-gradient(90deg, #00ccff, #ff00cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .container {
      position: relative;
      width: 100%;
      max-width: 1100px;
      height: 620px;
      margin: 0 auto;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 50px rgba(0, 200, 255, 0.5);
    }
    img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 2.5s ease-in-out;
    }
    #earth { opacity: 0; }
    .controls {
      margin-top: 25px;
    }
    button {
      padding: 14px 32px;
      margin: 0 12px;
      font-size: 1.1rem;
      background: linear-gradient(45deg, #0066ff, #00ccff);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 20px rgba(0, 100, 255, 0.4);
    }
  </style>
</head>
<body>
  <h1>Espaço → Terra</h1>
  
  <div class="container">
    <img id="space" src="https://marketplace.canva.com/MADesIAyZ0g/1/thumbnail_large/canva-high-definition-star-field%2C-colorful-night-sky-space.-nebula-and-galaxies-in-space.-astronomy-concept-background.-MADesIAyZ0g.jpg" alt="Espaço">
    <img id="earth" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTaEQJ6p4PDUvN7XVA33j-z8dAyRKilWkL39d2Dyx2vGA&s" alt="Terra">
  </div>

  <div class="controls">
    <button onclick="play()">▶ Reproduzir</button>
    <button onclick="reset()">Reiniciar</button>
  </div>

  <script>
    const space = document.getElementById('space');
    const earth = document.getElementById('earth');

    function play() {
      space.style.opacity = 1;
      earth.style.opacity = 0;
      
      setTimeout(() => {
        earth.style.opacity = 1;
      }, 2800);
    }

    function reset() {
      space.style.opacity = 1;
      earth.style.opacity = 0;
    }

    // Reproduz automaticamente ao carregar
    window.onload = () => setTimeout(play, 600);
  </script>
</body>
</html>
